<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">

  <title>Diamond Store | Login</title>
</head>

<body>

  <!-- =========================
       HEADER SIMPLE
  ========================== -->
  <header class="header">
    <a href="index.html" class="logo-box">
      <img src="Imagenes/logo.png" alt="Diamond Store Logo" class="logo">
    </a>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
    </nav>
  </header>


  <!-- =========================
       LOGIN MAIN
  ========================== -->
  <main class="login-container">

    <section class="login-box">

      <h1>Bienvenido</h1>
      <p class="subtitle">Inicia sesión para continuar</p>

      <form class="login-form" action="shop.html" method="post">

        <div class="input-group">
          <label for="email">Correo</label>
          <input type="email" id="email" placeholder="ejemplo@gmail.com" required>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox">
            Recordarme
          </label>

          <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login">Iniciar sesión</button>

        <p class="register-text">
          ¿No tienes cuenta?
          <a href="register.html">Regístrate</a>
        </p>

      </form>

    </section>

  </main>


  <!-- =========================
       FOOTER
  ========================== -->
  <footer class="footer">
    <p>&copy; Diamond Store 2026 - Todos los derechos reservados</p>
  </footer>

</body>
</html>
